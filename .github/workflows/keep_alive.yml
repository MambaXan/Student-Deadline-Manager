name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */4 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive request
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/auth/v1/health" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
